services:
  mtg-agent:
    image: python:3.12-alpine
    container_name: mtg-agent
    restart: unless-stopped
    network_mode: host
    pid: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/proc:ro
      - ./main.py:/app/main.py:ro
    working_dir: /app
    environment:
      - AGENT_TOKEN=${AGENT_TOKEN:-mtg-agent-secret}
      - CACHE_TTL=${CACHE_TTL:-15}
    command: sh -c "pip install --quiet --no-cache-dir fastapi uvicorn docker && uvicorn main:app --host 0.0.0.0 --port 8081 --log-level warning"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8081/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
